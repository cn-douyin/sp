<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♪ 極限⬆代儲 | 💎 充值試算</title>
    <style>
        /* --- 基礎設定 --- */
        :root {
            --bg-color: #0f1115;
            --card-bg: rgba(30, 34, 40, 0.8);
            --gold-primary: #d4af37;
            --gold-gradient: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --text-gray: #a0a0a0;
            --danger: #ff4d4d;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 10%, #2a2f3a 0%, #0f1115 70%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* --- 主卡片設計 --- */
        .calculator-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* 金色光澤邊框裝飾 */
        .calculator-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: var(--gold-gradient);
        }

        h1 {
            font-weight: 300;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.5rem;
        }

        .subtitle {
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* --- 切換開關 (Switch) --- */
        .mode-switch {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 30px;
            position: relative;
        }

        .mode-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: var(--text-gray);
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            z-index: 2;
        }

        .mode-btn.active {
            color: #1a1a1a;
            font-weight: bold;
            background: var(--gold-gradient);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        
        /* --- 模式標題強化 (僅影響「優惠時段/原價時段」文字) --- */
        .mode-title {
            display: block;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            line-height: 1.1;
            margin-bottom: 6px;
            color: inherit;
        }

        .mode-btn:not(.active) .mode-title {
            color: rgba(255, 255, 255, 0.88);
        }

        .mode-btn.active .mode-title {
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.35), 0 10px 25px rgba(212, 175, 55, 0.35);
        }
/* --- 輸入區塊 --- */
        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-label {
            display: block;
            color: var(--gold-primary);
            font-size: 0.85rem;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        input[type="number"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 1.2rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            border-color: var(--gold-primary);
        }

        .hint {
            font-size: 0.8rem;
            color: var(--text-gray);
            margin-top: 8px;
            display: flex;
            justify-content: space-between;
        }

        .error-msg {
            color: var(--danger);
            display: none; /* 預設隱藏 */
        }

        /* --- 結果顯示區 --- */
        .result-area {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        .result-label {
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .price-display {
            font-size: 2.5rem;
            font-weight: bold;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0;
        }

        .unit {
            font-size: 1rem;
            color: var(--gold-primary);
            -webkit-text-fill-color: initial;
        }

        /* --- 頁尾 --- */
        .footer {
            margin-top: 30px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.2);
        }

        /* RWD 手機適配 */
        @media (max-width: 480px) {
            .calculator-card {
                padding: 25px;
            }
            .price-display {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="calculator-card">
        <h1> 💎 陸版抖音♪ | 極限⬆代儲 🚀🚀🚀</h1>
        <div class="subtitle">  </div>

        <div class="mode-switch">
            <button class="mode-btn active" onclick="setMode('promo')"><span class="mode-title">優惠時段</span> <br>  13:00 ~ 17:00 <br> 20:00 ~ 23:00 </button>
            <button class="mode-btn" onclick="setMode('normal')"><span class="mode-title">原價時段</span> <br>  17:00 ~ 20:00 <br> 23:00 ~ 13:00 </button>
        </div>

        <div class="input-group">
            <label class="input-label">輸入鑽石數量 </label>
            <input type="number" id="diamondInput" placeholder="請輸入數量" step="1000" oninput="calculate()">
            <div class="hint">
                <span id="minReqText">最低起充：3,000 鑽</span>
                <span id="rateText">比值：485 TWD / 1k</span>
            </div>
            <div class="hint error-msg" id="errorMsg">低於起充門檻</div>
            <div class="hint error-msg" id="unitErrorMsg">數量需為 1000 的倍數</div>
        </div>

        <div class="result-area">
            <div class="result-label">充值金額</div>
            <div class="price-display">
                <span id="priceOutput">0</span> <span class="unit" id="twdUnit">TWD</span>
            </div>
        </div>

        <div class="footer">
            網頁將隨時保持更新 <br> 所有充值金額皆以網頁試算結果為準 <br> 
 <br> 版本：2026 / 04 / 07
        </div>
    </div>

 <script>
    /* ===== 設定變數 ===== */
    let currentMode = 'promo';

    const promoRate = 485 / 1000;
    const promoMin = 3000;

    const normalRate = 495 / 1000;
    const normalMin = 10000;

    const diamondInput = document.getElementById('diamondInput');
    const priceOutput = document.getElementById('priceOutput');
    const minReqText = document.getElementById('minReqText');
    const rateText = document.getElementById('rateText');
    const errorMsg = document.getElementById('errorMsg');
    const unitErrorMsg = document.getElementById('unitErrorMsg');
    const twdUnit = document.getElementById('twdUnit');
    const buttons = document.querySelectorAll('.mode-btn');

    /* ===== 模式切換 ===== */
    function setMode(mode) {
        currentMode = mode;

        buttons.forEach(btn => btn.classList.remove('active'));

        if (mode === 'promo') {
            buttons[0].classList.add('active');
            minReqText.innerText = `最低起充：${promoMin.toLocaleString()} 鑽`;
            rateText.innerText = `比值：485 TWD / 1k`;
        } else {
            buttons[1].classList.add('active');
            minReqText.innerText = `最低起充：${normalMin.toLocaleString()} 鑽`;
            rateText.innerText = `比值：495 TWD / 1k`;
        }

        calculate();
    }

    /* ===== 計算 ===== */
    function calculate() {
        const amount = parseFloat(diamondInput.value);

        if (isNaN(amount) || amount <= 0) {
            priceOutput.innerText = "0";
            errorMsg.style.display = 'none';
            unitErrorMsg.style.display = 'none';
            twdUnit.style.display = '';
            return;
        }

        if (amount % 1000 !== 0) {
            unitErrorMsg.style.display = 'block';
            errorMsg.style.display = 'none';
            priceOutput.innerText = "0";
            twdUnit.style.display = '';
            return;
        } else {
            unitErrorMsg.style.display = 'none';
        }

        let price = 0;
        let minRequirement = 0;

        if (currentMode === 'promo') {
            minRequirement = promoMin;
            price = amount * promoRate;
        } else {
            minRequirement = normalMin;
            price = amount * normalRate;
        }

        if (amount < minRequirement) {
            errorMsg.style.display = 'block';
            priceOutput.innerText = "未達起充門檻";
            twdUnit.style.display = 'none';
            return;
        } else {
            errorMsg.style.display = 'none';
            twdUnit.style.display = '';
        }

        priceOutput.innerText = Math.floor(price).toLocaleString();
    }

    /* ===== 進階防護系統 ===== */

    // 嘗試阻止被 iframe 嵌入
    try {
        if (window.top !== window.self) {
            window.top.location = window.self.location;
        }
    } catch (e) {}

    // 建立黑屏遮罩
    const antiOverlay = document.createElement("div");
    antiOverlay.id = "antiOverlay";
    antiOverlay.style.position = "fixed";
    antiOverlay.style.inset = "0";
    antiOverlay.style.background = "#000";
    antiOverlay.style.color = "#fff";
    antiOverlay.style.zIndex = "999999";
    antiOverlay.style.display = "none";
    antiOverlay.style.alignItems = "center";
    antiOverlay.style.justifyContent = "center";
    antiOverlay.style.flexDirection = "column";
    antiOverlay.style.textAlign = "center";
    antiOverlay.style.padding = "24px";
    antiOverlay.style.fontSize = "20px";
    antiOverlay.style.letterSpacing = "2px";
    antiOverlay.innerHTML = `
        <div>系統偵測到異常操作</div>
        <div style="font-size:14px;opacity:.7;margin-top:10px;">請關閉相關工具後重新整理頁面</div>
    `;
    document.body.appendChild(antiOverlay);

    function showOverlay(msg) {
        if (msg) {
            antiOverlay.innerHTML = `
                <div>${msg}</div>
                <div style="font-size:14px;opacity:.7;margin-top:10px;">請關閉相關工具後重新整理頁面</div>
            `;
        }
        antiOverlay.style.display = "flex";
    }

    function hideOverlay() {
        antiOverlay.style.display = "none";
    }

    // 禁止右鍵
    document.addEventListener("contextmenu", function (e) {
        e.preventDefault();
    });

    // 禁止複製 / 剪下 / 貼上 / 拖曳 / 選取
    ["copy", "cut", "paste", "dragstart", "selectstart"].forEach(evt => {
        document.addEventListener(evt, function (e) {
            e.preventDefault();
        });
    });

    // 禁止常見快捷鍵
    document.addEventListener("keydown", function (e) {
        const key = (e.key || "").toLowerCase();

        // F12
        if (e.key === "F12") {
            e.preventDefault();
            return false;
        }

        // Ctrl + Shift + I / J / C / K
        if (e.ctrlKey && e.shiftKey && ["i", "j", "c", "k"].includes(key)) {
            e.preventDefault();
            return false;
        }

        // Ctrl + U / S / P / A / C / X / V
        if (e.ctrlKey && ["u", "s", "p", "a", "c", "x", "v"].includes(key)) {
            e.preventDefault();
            return false;
        }
    }, true);

    // 視窗失焦時暫時遮罩
    window.addEventListener("blur", function () {
        antiOverlay.dataset.blurMode = "1";
        antiOverlay.style.display = "flex";
        antiOverlay.innerHTML = `
            <div>頁面已暫時保護</div>
            <div style="font-size:14px;opacity:.7;margin-top:10px;">返回此頁後會自動恢復</div>
        `;
    });

    window.addEventListener("focus", function () {
        if (antiOverlay.dataset.blurMode === "1") {
            antiOverlay.dataset.blurMode = "";
            antiOverlay.style.display = "none";
        }
    });

    // DevTools 偵測
    (function () {
        let devtoolsOpen = false;

        function detectDevtools() {
            const widthGap = window.outerWidth - window.innerWidth;
            const heightGap = window.outerHeight - window.innerHeight;

            const widthTriggered = widthGap > 160;
            const heightTriggered = heightGap > 160;

            const start = performance.now();
            debugger;
            const end = performance.now();
            const debuggerDelay = (end - start) > 120;

            const opened = widthTriggered || heightTriggered || debuggerDelay;

            if (opened && !devtoolsOpen) {
                devtoolsOpen = true;
                showOverlay("系統偵測到開發者工具");
            } else if (!opened && devtoolsOpen) {
                devtoolsOpen = false;

                // 如果不是 blur 模式，才關閉黑屏
                if (antiOverlay.dataset.blurMode !== "1") {
                    hideOverlay();
                }
            }
        }

        setInterval(detectDevtools, 800);
    })();
</script>
</body>
</html>
